<div class="auth-wrapper">
  <div class="auth-left">
    <div>
      <h1>ThưViện</h1>
      <p>
        "Một cuốn sách hay có thể thay đổi cuộc đời bạn."
        <br>Đăng nhập để mượn sách, lưu danh sách yêu thích và khám phá tri thức.
      </p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <h2>Đăng nhập</h2>
      <p class="muted">Chào mừng bạn quay lại thư viện</p>

      <form (ngSubmit)="onSubmit()">
        <input type="text" placeholder="Tên đăng nhập hoặc Email" [(ngModel)]="username" name="username" required>
        <input type="password" placeholder="Mật khẩu" [(ngModel)]="password" name="password" required>
        <button type="submit">Đăng nhập</button>
      </form>

      <div class="switch">
        Chưa có tài khoản?
        <a routerLink="/register">Đăng ký</a>
      </div>
    </div>
  </div>
</div>
